  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --accent-strong: #4d6a53;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #f8fff8 0, #f6faf6 40%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--safe-t);
    }
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px calc(28px + var(--safe-b));
    }
    .page-head {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }
    .page-head h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4.5vw, 1.75rem);
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--accent-strong);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
    }
    .back-link:hover {
      background: #fafcfb;
      border-color: #c5d8c9;
    }
    .intro {
      margin: 0 0 18px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--muted);
    }
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .log-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 18px 16px;
      box-shadow: 0 12px 32px rgba(47, 73, 55, 0.06);
    }
    .log-card h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      line-height: 1.35;
    }
    .log-card h2 a {
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 700;
    }
    .log-card h2 a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .log-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .log-card p {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #304034;
    }
    .site-footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      text-align: center;
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.65;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .site-footer-nav,
    .site-footer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      justify-content: center;
      align-items: center;
    }
    .site-footer-meta { font-size: 0.82rem; }
    .site-footer a {
      color: var(--accent-strong);
      font-weight: 600;
      text-decoration: none;
    }
    .site-footer a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .site-footer-sep {
      color: #b8c9bc;
      font-weight: 700;
      user-select: none;
    }
    @media (min-width: 480px) {
      .shell { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
