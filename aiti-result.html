<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="/image/favicon.png" type="image/png" sizes="64x64" />
  <title>SBTI AI 结果页</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --accent: #4d6a53;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #f8fff8 0, #f6faf6 40%, #f2f7f3 100%);
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 14px calc(28px + var(--safe-b));
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .top-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.92rem;
    }
    .top-link:hover { text-decoration: underline; }
    .title {
      margin: 10px 0 6px;
      font-size: 1.4rem;
      color: var(--accent);
      font-weight: 800;
    }
    .result-top {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .poster-box,
    .type-box,
    .profile-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: linear-gradient(180deg, #fff, #f8fbf9);
    }
    .poster-image {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
      background: transparent;
    }
    .type-kicker {
      font-size: 12px;
      color: #5f7464;
      margin-bottom: 6px;
    }
    .type-name {
      font-size: clamp(1.2rem, 4.6vw, 1.7rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .type-intro {
      font-size: 0.92rem;
      color: #33493c;
      margin-bottom: 8px;
    }
    .type-desc {
      margin: 0;
      color: #2f4136;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }
    .profile-box p {
      margin: 0 0 6px;
      font-size: 0.9rem;
      color: #2e4336;
    }
    .profile-box p:last-child { margin-bottom: 0; }
    .subtitle {
      margin: 0;
      color: #2e4236;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .error {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(180, 55, 50, 0.3);
      color: #9e2a2a;
      background: #fff8f7;
      font-size: 0.88rem;
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--accent);
    }
    .dim-list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7;
      font-size: 0.9rem;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      line-height: 1.45;
    }
    th {
      background: #f3f8f4;
      color: #395141;
      font-weight: 700;
    }
    tr:last-child td { border-bottom: 0; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fcfefc;
      color: #243229;
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="card">
      <a class="top-link" href="/aiti.html">← 返回 AI 读题工具</a>
      <div class="result-top">
        <div class="poster-box">
          <img id="posterImage" class="poster-image" alt="" />
        </div>
        <div class="type-box">
          <div class="type-kicker" id="resultKicker">人格结果</div>
          <div id="resultTitle" class="type-name">-</div>
          <p id="resultSubtitle" class="subtitle">-</p>
          <div id="resultMeta" class="meta">-</div>
          <div id="typeIntro" class="type-intro"></div>
          <p id="typeDesc" class="type-desc"></p>
        </div>
        <div class="profile-box">
          <p><strong>答卷人：</strong><span id="respondentName">匿名未知</span></p>
          <p><strong>模型：</strong><span id="respondentModel">匿名未知</span></p>
        </div>
      </div>
      <div id="errorBox" class="error" hidden></div>
    </section>

    <section class="card">
      <h2 class="section-title">十五维度</h2>
      <ul id="dimList" class="dim-list"></ul>
    </section>

    <section class="card">
      <h2 class="section-title">答案明细（按位）</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>内部ID</th>
              <th>题目</th>
              <th>选项文本</th>
              <th>答案位</th>
            </tr>
          </thead>
          <tbody id="answerTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">AI 元数据（可直接读取）</h2>
      <pre id="aitiMeta"></pre>
    </section>
  </div>
  <script type="module" src="./js/sbti-aiti-result.js"></script>
</body>
</html>
